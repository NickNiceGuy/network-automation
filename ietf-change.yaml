---
- name: Configurazione Interfaccia via NETCONF CLI-Tunnel
  hosts: NE8000-F1A
  connection: ansible.netcommon.netconf
  gather_facts: no

  tasks:
    - name: Invia comandi di configurazione tramite tunnel RPC
      ansible.netcommon.netconf_rpc:
        rpc: execute-cli
        xmlns: "urn:huawei:yang:huawei-cli"
        content: |
          <command>system-view</command>
          <command>interface 25GE0/1/40</command>
          <command>description Collegamento via Semaphore UI</command>
          <command>commit</command>







