---
- name: Configurazione Interfaccia via NETCONF Standard
  hosts: NE8000-F1A
  connection: ansible.netcommon.netconf
  gather_facts: no

  tasks:
    - name: Applica descrizione su interfaccia 25GE0/1/40
      ansible.netcommon.netconf_config:
        config: |
          <interfaces xmlns="urn:ietf:params:xml:ns:yang:ietf-interfaces">
            <interface>
              <name>25GE0/1/40</name>
              <description>Collegamento via Semaphore UI</description>
            </interface>
          </interfaces>



