
# Ansible will need some basic information to make sure
# it can connect to the target device before attempting
# a NETCONF message. Ansible will look in the same directory
# as the playbook file for ansible.cfg.
#
# Nearly all parameters in ansible.cfg can be overridden
# with ansible-playbook command line flags.

# Example of basic ansible.cfg file
#
#[defaults]
#inventory = ./ansible_host
#host_key_checking = False
#remote_user = USERNAME_HERE

# Example of basic ansible_host file referred to in
# ansible.cfg inventory.
#
#[all:vars]
#ansible_connection=netconf
#ansible_password=PASSWORD_HERE
#
#[MY_HOST_NAME]
#IP_ADDRESS_HERE
#
---
- name: NETCONF playbook
  hosts: all
  gather_facts: no
  vars:
    ansible_persistent_connect_timeout: 90
    ansible_persistent_command_timeout: 90
    ansible_command_timeout: 90
    interface_name: "25GE0/1/40.200"
    interface_desc: "Configurato via Semaphore"

  tasks:
    # QUI LO TROVI E QUI LO METTI: Sotto la voce 'tasks' come modulo principale
    - name: Esegui RPC NETCONF Edit-Config sul Huawei
      ansible.netcommon.netconf_rpc:
        rpc: edit-config
        content: |
          <target>
            <candidate/>
          </target>
          <config xmlns:nc="urn:ietf:params:xml:ns:netconf:base:1.0">
            <ifm xmlns="urn:huawei:yang:huawei-ifm">
              <interfaces>
                <interface>
                  <name>{{ interface_name }}</name>
                  <description>{{ interface_desc }}</description>
                </interface>
              </interfaces>
            </ifm>
          </config>
