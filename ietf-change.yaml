---
- name: CLI playbook via NETCONF
  hosts: all
  gather_facts: no
  tasks:
    - name: Configura descrizione interfaccia su Huawei via NETCONF
      ansible.netcommon.netconf_config:
        xml: |
          <config>
            <ifm xmlns="urn:huawei:yang:huawei-ifm">
              <interfaces>
                <interface>
                  <name>GigabitEthernet0/1/0</name>
                  <description>Collegamento via Semaphore UI</description>
                </interface>
              </interfaces>
            </ifm>
          </config>


