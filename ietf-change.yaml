---
- name: Bypass Automazione Huawei via SSH Nativo
  hosts: localhost
  gather_facts: no

  tasks:
    - name: Invia comandi di configurazione via SSH Raw
      ansible.builtin.shell: |
        sshpass -p 'Net2026$' ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null netconf@10.15.12.1 << 'EOF'
        system-view
        interface 25GE0/1/40
        description "Collegamento via Semaphore UI"
        commit
        return
        quit
        EOF
      register: ssh_output

    - name: Mostra log di risposta del router Huawei
      ansible.builtin.debug:
        var: ssh_output.stdout_lines









