<rpc message-id="102" xmlns="urn:ietf:params:xml:ns:netconf:base:1.0">
  <edit-config>
    <target>
      <candidate/>
    </target>
    <config>
      <!-- 1. Creazione della sub-interfaccia logica e switch in modalità L2 -->
      <ifm:ifm xmlns:ifm="http://huawei.com">
        <ifm:interfaces>
          <ifm:interface>
            <ifm:name>GE0/1/0.100</ifm:name>
            <ifm:class>sub-interface</ifm:class>
            <ifm:parentName>GE0/1/0</ifm:parentName>
            <ifm:l2Mode>l2</ifm:l2Mode> 
          </ifm:interface>
        </ifm:interfaces>
      </ifm:ifm>

      <!-- 2. Associazione al Bridge Domain (modello huawei-bd) -->
      <bd:bd xmlns:bd="http://huawei.com">
        <bd:instances>
          <bd:instance>
            <bd:id>10</bd:id> <!-- ID del Bridge Domain -->
            <bd:servicePoints>
              <bd:servicePoint>
                <bd:interfaceName>GE0/1/0.100</bd:interfaceName>
              </bd:servicePoint>
            </bd:servicePoints>
          </bd:instance>
        </bd:instances>
      </bd:bd>
    </config>
  </edit-config>
</rpc>












