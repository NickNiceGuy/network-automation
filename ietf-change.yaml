---
- name: Configurazione Interfaccia via CLI SSH Universale
  hosts: NE8000-F1A
  gather_facts: no
  vars:
    ansible_connection: ansible.netcommon.network_cli
    ansible_network_os: vrp

  tasks:
    - name: Invia sequenza comandi di configurazione su Huawei
      ansible.netcommon.cli_command:
        command: "{{ item }}"
      loop:
        - system-view
        - interface 25GE0/1/40
        - description "Collegamento via Semaphore UI"
        - commit
        - return





