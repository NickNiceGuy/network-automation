---
- name: CLI playbook via NETCONF
  hosts: all
  gather_facts: no
  tasks:
    - name: Configura descrizione interfaccia su Huawei via NETCONF
      ansible.netcommon.netconf_config:
        xml: |
          <config>
            <ifm xmlns="http://huawei.com">
              <interfaces>
                <interface>
                  <ifName>GigabitEthernet0/1/0</ifName>
                  <ifDescr>Collegamento via Semaphore UI</ifDescr>
                </interface>
              </interfaces>
            </ifm>
          </config>

