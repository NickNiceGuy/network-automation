---
- name: Configurazione Interfaccia via NETCONF Raw RPC
  hosts: NE8000-F1A
  connection: ansible.netcommon.netconf
  gather_facts: no

  tasks:
    - name: Applica configurazione tramite blocco XML pulito
      ansible.netcommon.netconf_rpc:
        rpc: edit-config
        content: |
          <target>
            <candidate/>
          </target>
          <config>
            <interfaces xmlns="urn:ietf:params:xml:ns:yang:ietf-interfaces">
              <interface>
                <name>25GE0/1/40</name>
                <description>Collegamento via Semaphore UI</description>
              </interface>
            </interfaces>
          </config>








