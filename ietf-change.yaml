- name: Playbook per modifica configurazione interfaccia
  hosts: NE8000-F1A
  connection: netconf
  gather_facts: no

  tasks:
    - name: Modifica descrizione interfaccia 25GE0/1/40
      ansible.netcommon.netconf_config:
        # 1. Specifichiamo "candidate" come target per i dispositivi Huawei
        target: candidate
        # 2. Inseriamo il blocco XML di configurazione
        config: |
          <config xmlns="urn:ietf:params:xml:ns:netconf:base:1.0">
            <ifm xmlns="urn:huawei:params:xml:ns:yang:huawei-ifm">
              <interfaces>
                <interface>
                  <name>25GE0/1/40</name>
                  <description>Configurato via Semaphore UI</description>
                </interface>
              </interfaces>
            </ifm>
          </config>
      register: write_result

    # DEBUG: Mostra se la configurazione è stata inviata correttamente al candidate
    - name: Mostra risultato scrittura
      debug:
        var: write_result













