- name: Playbook per modifica configurazione interfaccia
  hosts: NE8000-F1A
  connection: netconf
  gather_facts: no

  tasks:
    - name: Modifica descrizione interfaccia 25GE0/1/42
      ansible.netcommon.netconf_config:
        target: candidate
        content: |
          <config xmlns="urn:ietf:params:xml:ns:netconf:base:1.0">
            <!-- Corretto il namespace nativo di Huawei (urn:huawei:yang:huawei-ifm) -->
            <ifm xmlns="urn:huawei:yang:huawei-ifm">
              <interfaces>
                <interface>
                  <name>25GE0/1/42</name>
                  <description>Configurato via Semaphore UI</description>
                </interface>
              </interfaces>
            </ifm>
          </config>
      register: write_result

    - name: Mostra risultato scrittura
      debug:
        var: write_result












