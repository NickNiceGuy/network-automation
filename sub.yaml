
# Ansible will need some basic information to make sure
# it can connect to the target device before attempting
# a NETCONF message. Ansible will look in the same directory
# as the playbook file for ansible.cfg.
#
# Nearly all parameters in ansible.cfg can be overridden
# with ansible-playbook command line flags.

# Example of basic ansible.cfg file
#
#[defaults]
#inventory = ./ansible_host
#host_key_checking = False
#remote_user = USERNAME_HERE

# Example of basic ansible_host file referred to in
# ansible.cfg inventory.
#
#[all:vars]
#ansible_connection=netconf
#ansible_password=PASSWORD_HERE
#
#[MY_HOST_NAME]
#IP_ADDRESS_HERE
#
- name : NETCONF playbook
  hosts: MY_HOST_NAME
  connection: netconf
  gather_facts: no

  tasks:
    - name: NETCONF RPC
      netconf_config:
        xml: |
            <config xmlns="urn:ietf:params:xml:ns:netconf:base:1.0">
              <ifm xmlns="urn:huawei:yang:huawei-ifm">
                <interfaces>
                  <interface xmlns:nc="urn:ietf:params:xml:ns:netconf:base:1.0" nc:operation="merge">
                    <name>25GE0/1/40.222</name>
                    <class>sub-interface</class>
                    <l2-mode-enable>true</l2-mode-enable>
                    <ethernet xmlns="urn:huawei:yang:huawei-ethernet">
                      <l2-sub-interface nc:operation="merge">
                        <dot1q>
                          <vlans nc:operation="merge">
                            <vlan-list>222</vlan-list>
                          </vlans>
                        </dot1q>
                        <flow-action nc:operation="merge">
                          <action-type>map-1-to-1</action-type>
                          <out-vlan-id>122</out-vlan-id>
                        </flow-action>
                      </l2-sub-interface>
                    </ethernet>
                  </interface>
                </interfaces>
              </ifm>
            </config>

