- name: Playbook per creazione e descrizione Subinterface via NETCONF
  hosts: NE8000-F1A
  connection: netconf
  gather_facts: no

  tasks:
    - name: Crea subinterface 25GE0/1/42.100, descrizione e VLAN
      ansible.netcommon.netconf_config:
        target: candidate
        content: |
          <config xmlns="urn:ietf:params:xml:ns:netconf:base:1.0">
            
            <ifm xmlns="urn:huawei:yang:huawei-ifm">
              <interfaces>
                <interface>
                  <name>25GE0/1/42.100</name>
                  <parent-name>25GE0/1/42</parent-name>
                  <type>Sub-Interface</type>
                  <description>Subint creata da Semaphore UI</description>
                </interface>
              </interfaces>
            </ifm>

            <vlan-termination xmlns="urn:huawei:yang:huawei-vlan-termination">
              <dot1q-terminations>
                <dot1q-termination>
                  <if-name>25GE0/1/42.100</if-name>
                  <vlans>
                    <vlan>
                      <vlan-id>100</vlan-id>
                    </vlan>
                  </vlans>
                </dot1q-termination>
              </dot1q-terminations>
            </vlan-termination>

          </config>
      register: subint_result

    - name: Mostra esito creazione
      debug:
        var: subint_result









