- name: Playbook per creazione e descrizione Subinterface
  hosts: NE8000-F1A
  connection: netconf
  gather_facts: no

  tasks:
    - name: Crea subinterface 25GE0/1/42.100 e imposta descrizione
      ansible.netcommon.netconf_config:
        target: candidate
        content: |
          <config xmlns="urn:ietf:params:xml:ns:netconf:base:1.0">
            <!-- Namespace corretto e funzionante -->
            <ifm xmlns="urn:huawei:yang:huawei-ifm">
              <interfaces>
                <interface>
                  <name>25GE0/1/42.100</name>
                  <class>sub-interface</class>
                  <description>Subint creata da Semaphore UI</description>
                  
                  <!-- Configurazione VLAN Dot1q con namespace corretto -->
                  <ethernet xmlns="urn:huawei:yang:huawei-ethernet">
                    <vlan-type-dot1q>
                      <vlan-id>100</vlan-id>
                    </vlan-type-dot1q>
                  </ethernet>
                  
                </interface>
              </interfaces>
            </ifm>
          </config>
      register: subint_result

    - name: Mostra esito creazione
      debug:
        var: subint_result
