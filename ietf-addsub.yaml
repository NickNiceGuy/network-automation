- name: Playbook per creazione e descrizione Subinterface via NETCONF
  hosts: NE8000-F1A
  connection: netconf
  gather_facts: no

  tasks:
    - name: Crea subinterface 25GE0/1/42.100, descrizione e VLAN
      ansible.netcommon.netconf_config:
        target: candidate
        content: |
          <config xmlns="urn:ietf:params:xml:ns:netconf:base:1.0">
            
            <!-- 1. Creiamo la subinterface logica e la descrizione (Modulo IFM) -->
            <ifm xmlns="urn:huawei:yang:huawei-ifm">
              <interfaces>
                <interface>
                  <name>25GE0/1/42.100</name>
                  <class>sub-interface</class>
                  <description>Subint creata da Semaphore UI</description>
                </interface>
              </interfaces>
            </ifm>

            <!-- 2. Associano il tag VLAN 100 alla subinterface (Modulo IP-VLAN-TERMINATION) -->
            <ip-vlan-termination xmlns="urn:huawei:yang:huawei-ip-vlan-termination">
              <dot1q-terminations>
                <dot1q-termination>
                  <if-name>25GE0/1/42.100</if-name>
                  <vlans>
                    <vlan>
                      <vlan-id>100</vlan-id>
                    </vlan>
                  </vlans>
                </dot1q-termination>
              </dot1q-terminations>
            </ip-vlan-termination>

          </config>
      register: subint_result

    - name: Mostra esito creazione
      debug:
        var: subint_result









