- name: Playbook per creazione e descrizione Subinterface via NETCONF
  hosts: NE8000-F1A
  connection: netconf
  gather_facts: no

  tasks:
    - name: Crea subinterface 25GE0/1/42.100, descrizione e VLAN
      ansible.netcommon.netconf_config:
        target: candidate
        content: |
          <config xmlns="urn:ietf:params:xml:ns:netconf:base:1.0">
            <ifm xmlns="urn:huawei:yang:huawei-ifm">
              <interfaces>
                <interface>
                  <!-- Crea la risorsa logica della sottointerfaccia -->
                  <name>25GE0/1/42.100</name>
                  <class>sub-interface</class>
                  <description>Subint creata da Semaphore UI</description>
                </interface>
              </interfaces>
              
              <!-- Struttura corretta per legare la VLAN 100 alla subinterface -->
              <dot1q-terminations>
                <dot1q-termination>
                  <name>25GE0/1/42.100</name>
                  <vlan-id>100</vlan-id>
                </dot1q-termination>
              </dot1q-terminations>
            </ifm>
          </config>
      register: subint_result

    - name: Mostra esito creazione
      debug:
        var: subint_result





