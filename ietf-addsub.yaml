- name: Playbook per creazione e descrizione Subinterface via NETCONF Action
  hosts: NE8000-F1A
  connection: netconf
  gather_facts: no

  tasks:
    - name: Esegui configurazione subinterface tramite NETCONF Action
      ansible.netcommon.netconf_rpc:
        rpc: execute-action
        content: |
          <action xmlns="urn:huawei:yang:huawei-extension">
            <execute-cli>
              <command>system-view</command>
              <command>interface 25GE0/1/42.100</command>
              <command>description Subint creata da Semaphore UI</command>
              <command>dot1q termination vid 100</command>
              <command>arp broadcast enable</command>
              <command>commit</command>
            </execute-cli>
          </action>
      register: action_result

    - name: Mostra esito operazione
      debug:
        var: action_result








