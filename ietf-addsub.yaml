- name: Playbook per creazione e descrizione Subinterface via CLI
  hosts: NE8000-F1A
  # CAMBIO CHIAVE: Diciamo ad Ansible di usare la CLI classica e non NETCONF
  connection: ansible.netcommon.network_cli
  gather_facts: no

  tasks:
    - name: Configura subinterface e descrizione sul NetEngine
      ansible.netcommon.cli_config:
        config: |
          interface 25GE0/1/42.100
           description Subint creata da Semaphore UI
           dot1q termination vid 100
           arp broadcast enable
      register: cli_result

    - name: Mostra esito operazione
      debug:
        var: cli_result
