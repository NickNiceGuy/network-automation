- name: Playbook per creazione Subinterface via NETCONF RPC CLI
  hosts: NE8000-F1A
  connection: netconf
  gather_facts: no

  tasks:
    - name: Invia comandi CLI tramite canale NETCONF
      ansible.netcommon.netconf_rpc:
        rpc: execute-cli
        xmlns: "urn:huawei:yang:huawei-cli"
        content: |
          <commands>
            <command>system-view</command>
            <command>interface 25GE0/1/42.100</command>
            <command>description Subint creata da Semaphore UI via RPC</command>
            <command>dot1q termination vid 100</command>
            <command>arp broadcast enable</command>
            <command>commit</command>
          </commands>
      register: rpc_result

    - name: Mostra esito operazione
      debug:
        var: rpc_result


