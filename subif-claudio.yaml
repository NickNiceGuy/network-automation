---
# =====================================================================
# Playbook Ansible per Huawei NE8000 V8R24 - L2 sub-interface + BD bind
# Single-file, importabile direttamente in Semaphore UI.
#
# Requisiti collection (installare nell'env Ansible di Semaphore):
#   ansible-galaxy collection install ansible.netcommon
#
# Variabili attese (definirle in Semaphore: Environment JSON oppure Survey):
#   parent_interface: "25GE0/1/40"
#   parent_type:      "25GE"
#   subif_number:     222
#   vlan_id:          222          # outer VLAN (dot1q vid)
#   rewrite_out_vlan: 122          # rewrite map 1-to-1 vid (lasciare null per disabilitare)
#   bridge_domain:    100          # null per non bindare a BD
#   subif_state:      "present"    # "present" | "absent"
#
# Connessione (in Semaphore: Inventory + Environment):
#   ansible_connection:   ansible.netcommon.netconf
#   ansible_network_os:   huawei.network.ne   (oppure community.network.ce)
#   ansible_port:         22
#   ansible_user:         <login>
#   ansible_password:     <password>      # in Semaphore: Key Store (Login With Password)
# =====================================================================

- name: Configure L2 sub-interface on NE8000
  hosts: ne8000
  gather_facts: false
  connection: ansible.netcommon.netconf

  vars:
    subif_state: present
    rewrite_out_vlan: null
    bridge_domain: null
    subif_name: "{{ parent_interface }}.{{ subif_number }}"

  tasks:

    - name: "PRESENT: create/update sub-interface {{ subif_name }} and bind to BD"
      when: subif_state == 'present'
      ansible.netcommon.netconf_config:
        target: running
        error_option: rollback-on-error
        content: |
          <config xmlns:nc="urn:ietf:params:xml:ns:netconf:base:1.0">
            <ifm xmlns="urn:huawei:yang:huawei-ifm">
              <interfaces>
                <interface nc:operation="merge">
                  <name>{{ subif_name }}</name>
                  <class>sub-interface</class>
                  <type>{{ parent_type }}</type>
                  <parent-name>{{ parent_interface }}</parent-name>
                  <number>{{ subif_number }}</number>
                  <l2-mode-enable>true</l2-mode-enable>
                  <ethernet xmlns="urn:huawei:yang:huawei-ethernet">
                    <l2-sub-interface>
                      <dot1q>
                        <vlans>
                          <vlan-list>{{ vlan_id }}</vlan-list>
                        </vlans>
                      </dot1q>
          {% if rewrite_out_vlan is not none %}
                      <flow-action>
                        <action-type>map-1-to-1</action-type>
                        <out-vlan-id>{{ rewrite_out_vlan }}</out-vlan-id>
                      </flow-action>
          {% endif %}
                    </l2-sub-interface>
                  </ethernet>
                </interface>
              </interfaces>
            </ifm>
          {% if bridge_domain is not none %}
            <bd xmlns="urn:huawei:yang:huawei-bd">
              <instances>
                <instance>
                  <id>{{ bridge_domain }}</id>
                  <service-points>
                    <service-point nc:operation="merge">
                      <interface-name>{{ subif_name }}</interface-name>
                    </service-point>
                  </service-points>
                </instance>
              </instances>
            </bd>
          {% endif %}
          </config>

    - name: "ABSENT: delete sub-interface {{ subif_name }}"
      when: subif_state == 'absent'
      ansible.netcommon.netconf_config:
        target: running
        error_option: rollback-on-error
        content: |
          <config xmlns:nc="urn:ietf:params:xml:ns:netconf:base:1.0">
            <ifm xmlns="urn:huawei:yang:huawei-ifm">
              <interfaces>
                <interface nc:operation="delete">
                  <name>{{ subif_name }}</name>
                </interface>
              </interfaces>
            </ifm>
          </config>

    - name: "Verify config (get-config of the sub-interface)"
      ansible.netcommon.netconf_get:
        source: running
        filter:
          - xpath: "/ifm/interfaces/interface[name='{{ subif_name }}']"
            namespaces:
              ifm: urn:huawei:yang:huawei-ifm
      register: subif_after
      when: subif_state == 'present'

    - name: "Show resulting config"
      when: subif_state == 'present'
      debug:
        var: subif_after.stdout
